name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # needed to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog diff

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Run tests and lint
        run: ./gradlew :app:testDebugUnitTest :app:lint

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::SIGNING_KEYSTORE_BASE64 secret is not set"
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          echo "SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.tag }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Prepare artifacts
        id: artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/grayout-v${VERSION}.apk"
          cd dist
          shasum -a 256 "grayout-v${VERSION}.apk" > "grayout-v${VERSION}.apk.sha256"
          echo "apk=dist/grayout-v${VERSION}.apk" >> "$GITHUB_OUTPUT"
          echo "sha=dist/grayout-v${VERSION}.apk.sha256" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ steps.version.outputs.tag }}^" 2>/dev/null || echo "")
          RANGE="${PREV_TAG:+$PREV_TAG..}${{ steps.version.outputs.tag }}"
          {
            echo "## What's Changed"
            echo ""
            FEATS=$(git log --pretty=format:'- %s (%h)' "$RANGE" | grep -E '^- feat(\(|:)' || true)
            [ -n "$FEATS" ] && { echo "### Features"; echo "$FEATS"; echo ""; }
            FIXES=$(git log --pretty=format:'- %s (%h)' "$RANGE" | grep -E '^- fix(\(|:)' || true)
            [ -n "$FIXES" ] && { echo "### Fixes"; echo "$FIXES"; echo ""; }
            OTHER=$(git log --pretty=format:'- %s (%h)' "$RANGE" | grep -vE '^- (feat|fix)(\(|:)' || true)
            [ -n "$OTHER" ] && { echo "### Other"; echo "$OTHER"; echo ""; }
            echo "---"
            echo "**SHA-256:** \`$(cat ${{ steps.artifacts.outputs.sha }} | awk '{print $1}')\`"
            [ -n "$PREV_TAG" ] && echo "**Full changelog:** https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ steps.version.outputs.tag }}"
          } > release-notes.md

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.artifacts.outputs.apk }}" \
            "${{ steps.artifacts.outputs.sha }}" \
            --title "Grayout ${{ steps.version.outputs.tag }}" \
            --notes-file release-notes.md
